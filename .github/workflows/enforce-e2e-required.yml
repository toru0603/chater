name: Enforce E2E required

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  administration: write

jobs:
  set-protection:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Ensure E2E is required in branch protection
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';
            const e2e = ['CI/E2E Tests (Playwright)'];
            try {
              const res = await github.request('GET /repos/{owner}/{repo}/branches/{branch}/protection', {owner, repo, branch});
              const existing = (res.data.required_status_checks && res.data.required_status_checks.contexts) ? res.data.required_status_checks.contexts : [];
              const all = Array.from(new Set([...existing, ...e2e]));
              await github.request('PUT /repos/{owner}/{repo}/branches/{branch}/protection', {
                owner, repo, branch,
                required_status_checks: {strict: true, contexts: all},
                enforce_admins: true,
                required_pull_request_reviews: null,
                restrictions: null
              });
              console.log('Set required checks to:', all);
            } catch (err) {
              if (err.status === 404) {
                await github.request('PUT /repos/{owner}/{repo}/branches/{branch}/protection', {
                  owner, repo, branch,
                  required_status_checks: {strict: true, contexts: e2e},
                  enforce_admins: true,
                  required_pull_request_reviews: null,
                  restrictions: null
                });
                console.log('Created protection with E2E check');
              } else {
                console.log(err);
                throw err;
              }
            }

