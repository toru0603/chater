name: CI

permissions:
  checks: write
  contents: read
  issues: write
  pull-requests: write

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run unit tests with coverage
        run: |
          pytest --maxfail=1 --disable-warnings --cov=app --cov-branch --cov-report=xml --junitxml=unit-results.xml

      - name: Check coverage thresholds
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET, sys
          tree=ET.parse('coverage.xml')
          root=tree.getroot()
          pkg = root.find('packages').find('package')
          line_rate=float(pkg.get('line-rate'))*100
          branch_rate=float(pkg.get('branch-rate'))*100
          print(f'Line coverage: {line_rate:.1f}%, Branch coverage: {branch_rate:.1f}%')
          if line_rate < 90.0 or branch_rate < 80.0:
              print('Coverage thresholds not met', file=sys.stderr)
              sys.exit(1)
          PY

      - name: Create unit test summary
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET, json, sys, os
          junit='unit-results.xml'
          cov='coverage.xml'
          summary={}
          if os.path.exists(junit):
              try:
                  root=ET.parse(junit).getroot()
                  tests=int(root.get('tests') or 0)
                  failures=int(root.get('failures') or 0)
                  errors=int(root.get('errors') or 0)
                  skipped=int(root.get('skipped') or 0)
                  passed = tests - failures - errors - skipped
                  summary.update({'tests':tests,'passed':passed,'failures':failures,'errors':errors,'skipped':skipped})
              except Exception as e:
                  summary['tests_summary_error']=str(e)
          else:
              summary['tests']='missing'
          if os.path.exists(cov):
              try:
                  cr=ET.parse(cov).getroot()
                  pkg=cr.find('packages').find('package')
                  line_rate=float(pkg.get('line-rate'))*100
                  branch_rate=float(pkg.get('branch-rate'))*100
                  summary.update({'coverage_line':round(line_rate,1),'coverage_branch':round(branch_rate,1)})
              except Exception as e:
                  summary['coverage_error']=str(e)
          with open('unit-summary.json','w') as f:
              json.dump(summary,f)
          PY

      - name: Post unit test summary as check run output
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha || process.env.GITHUB_SHA || '';
            let md='### Unit Tests summary\n';
            try {
              const s=JSON.parse(fs.readFileSync('unit-summary.json','utf8'));
              if (s.tests && s.passed!==undefined) {
                md += `Passed: **${s.passed}/${s.tests}**\n\n`;
              } else if (s.tests==='missing') {
                md += 'Unit test results missing\n\n';
              }
              if (s.coverage_line) md += `Line coverage: **${s.coverage_line}%**, Branch coverage: **${s.coverage_branch}%**\n\n`;
            } catch (e) {
              md += 'Failed to parse unit-summary.json\n';
            }
            const runs = await github.rest.checks.listForRef({owner,repo,ref:sha});
            const unitRun = runs.data.check_runs.find(r=>r.name==='Unit Tests');
            if (unitRun) {
              await github.rest.checks.update({owner,repo,check_run_id: unitRun.id, output:{title:'Unit Tests summary', summary: md}});
            } else {
              core.info('Unit Tests run not found; skipping check run update.');
            }

      - name: Upload unit summary
        uses: actions/upload-artifact@v4
        with:
          name: unit-summary
          path: unit-summary.json

      - name: Post unit summary to PR
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const eventPath = process.env.GITHUB_EVENT_PATH;
            let prNumber = null;
            if (eventPath && fs.existsSync(eventPath)) {
              const payload = JSON.parse(fs.readFileSync(eventPath,'utf8'));
              prNumber = payload.pull_request && payload.pull_request.number;
            }
            if (!prNumber) { core.info('No pull_request in event payload; skipping PR comment'); return; }
            let md='<!-- ci-summary -->\n### Unit Tests\n';
            try {
              const s = JSON.parse(fs.readFileSync('unit-summary.json','utf8'));
              if (s.tests && s.passed!==undefined) md += `Passed: **${s.passed}/${s.tests}**\n\n`;
              if (s.coverage_line) md += `Line coverage: **${s.coverage_line}%**, Branch coverage: **${s.coverage_branch}%**\n\n`;
            } catch(e) { md += 'Failed to read unit-summary.json\n'; }
            const ownerRepo = process.env.GITHUB_REPOSITORY.split('/');
            const owner = ownerRepo[0]; const repo = ownerRepo[1];
            const comments = await github.rest.issues.listComments({owner, repo, issue_number: prNumber, per_page:100});
            const existing = comments.data.find(c => c.body && c.body.includes('<!-- ci-summary -->') && (c.user.type === 'Bot' || c.user.login === 'github-actions[bot]'));
            if (existing) {
              // merge: replace Unit Tests section or append if not present
              let body = existing.body;
              if (body.includes('### Unit Tests')) {
                // replace existing Unit Tests block
                body = body.replace(/### Unit Tests[\s\S]*?(?=(\n###|$))/m, md + '\n');
              } else {
                body = body + '\n' + md;
              }
              await github.rest.issues.updateComment({owner,repo,comment_id:existing.id, body});
            } else {
              await github.rest.issues.createComment({owner,repo,issue_number:prNumber, body: md});
            }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright pytest

      - name: Install Playwright browsers and deps
        run: |
          python -m playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          pytest --maxfail=1 --disable-warnings -q tests/e2e -k test_browser_playwright --junitxml=e2e-results.xml

      - name: Create e2e test summary
        if: always()
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET, json, os
          path='e2e-results.xml'
          summary={}
          if os.path.exists(path):
              try:
                  root=ET.parse(path).getroot()
                  tests=int(root.get('tests') or 0)
                  failures=int(root.get('failures') or 0)
                  errors=int(root.get('errors') or 0)
                  skipped=int(root.get('skipped') or 0)
                  passed = tests - failures - errors - skipped
                  summary.update({'tests':tests,'passed':passed,'failures':failures,'errors':errors,'skipped':skipped})
              except Exception as e:
                  summary['tests_summary_error']=str(e)
          else:
              summary['tests']='missing'
          with open('e2e-summary.json','w') as f:
              json.dump(summary,f)
          PY

      - name: Post e2e test summary as check run output
        if: always()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha || process.env.GITHUB_SHA || '';
            let md='### E2E Tests summary\n';
            try {
              const s=JSON.parse(fs.readFileSync('e2e-summary.json','utf8'));
              if (s.tests && s.passed!==undefined) md+=`Passed: **${s.passed}/${s.tests}**\n\n`;
              else if (s.tests==='missing') md+='E2E test results missing\n\n';
            } catch(e) { md+='Failed to parse e2e-summary.json\n'; }
            const runs = await github.rest.checks.listForRef({owner,repo,ref:sha});
            const e2eRun = runs.data.check_runs.find(r=>r.name==='E2E Tests (Playwright)');
            if (e2eRun) { await github.rest.checks.update({owner,repo,check_run_id: e2eRun.id, output:{title:'E2E Tests summary',summary:md}}); } else { core.info('E2E run not found'); }

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            e2e-summary.json
            /tmp/playwright-trace-*.zip
            /tmp/e2e-page1-*.png
            /tmp/e2e-page2-*.png

      - name: Post e2e summary to PR
        if: always()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const eventPath = process.env.GITHUB_EVENT_PATH;
            let prNumber = null;
            if (eventPath && fs.existsSync(eventPath)) {
              const payload = JSON.parse(fs.readFileSync(eventPath,'utf8'));
              prNumber = payload.pull_request && payload.pull_request.number;
            }
            if (!prNumber) { core.info('No pull_request in event payload; skipping PR comment'); return; }
            let md='### E2E Tests\n';
            try {
              const s = JSON.parse(fs.readFileSync('e2e-summary.json','utf8'));
              if (s.tests && s.passed!==undefined) md += `Passed: **${s.passed}/${s.tests}**\n\n`;
            } catch(e) { md += 'Failed to read e2e-summary.json\n'; }
            const ownerRepo = process.env.GITHUB_REPOSITORY.split('/');
            const owner = ownerRepo[0]; const repo = ownerRepo[1];
            const comments = await github.rest.issues.listComments({owner, repo, issue_number: prNumber, per_page:100});
            const existing = comments.data.find(c => c.body && c.body.includes('<!-- ci-summary -->') && (c.user.type === 'Bot' || c.user.login === 'github-actions[bot]'));
            if (existing) {
              let body = existing.body;
              if (body.includes('### E2E Tests')) {
                body = body.replace(/### E2E Tests[\s\S]*?(?=(\n###|$))/m, md + '\n');
              } else {
                body = body + '\n' + md;
              }
              await github.rest.issues.updateComment({owner,repo,comment_id:existing.id, body});
            } else {
              // create a new comment that includes marker and md
              const body = '<!-- ci-summary -->\n' + md;
              await github.rest.issues.createComment({owner,repo,issue_number:prNumber, body});
            }
