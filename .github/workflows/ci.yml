name: CI

permissions:
  checks: write
  contents: read
  issues: write
  pull-requests: write

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run unit tests with coverage
        run: |
          pytest --maxfail=1 --disable-warnings --cov=app --cov-branch --cov-report=xml --junitxml=${{ github.workspace }}/unit-results.xml

      - name: Check coverage thresholds and TCR
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET, sys, os
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          pkg = root.find('packages').find('package')
          line_rate = float(pkg.get('line-rate'))*100
          branch_rate = float(pkg.get('branch-rate'))*100
          print(f'Line coverage: {line_rate:.1f}%, Branch coverage: {branch_rate:.1f}%')

          if line_rate < 90.0 or branch_rate < 80.0:
              print('Coverage thresholds not met', file=sys.stderr)
              sys.exit(1)

          def count_nonempty_py_lines(root_dir):
              total = 0
              for dirpath, dirnames, filenames in os.walk(root_dir):
                  dirnames[:] = [d for d in dirnames if not d.startswith('.') and d != '__pycache__']
                  for fname in filenames:
                      if fname.endswith('.py'):
                          p = os.path.join(dirpath, fname)
                          try:
                              with open(p, 'r', encoding='utf-8') as fh:
                                  for ln in fh:
                                      if ln.strip():
                                          total += 1
                          except Exception:
                              with open(p, 'rb') as fh:
                                  for b in fh:
                                      if b.strip():
                                          total += 1
              return total

          tests_lines = count_nonempty_py_lines('tests') if os.path.isdir('tests') else 0
          app_lines = count_nonempty_py_lines('app') if os.path.isdir('app') else 0

          print(f'Test lines (non-empty): {tests_lines}, App lines (non-empty): {app_lines}')
          if app_lines == 0:
              print('No source lines found to compute TCR', file=sys.stderr)
              sys.exit(1)
          tcr = tests_lines / float(app_lines)
          print(f'Test-to-Code Ratio (TCR): {tcr:.2f}')

          min_tcr = 1.8
          max_tcr = 2.5
          if tcr < min_tcr or tcr > max_tcr:
              print(f'TCR {tcr:.2f} outside allowed range [{min_tcr}, {max_tcr}]', file=sys.stderr)
              sys.exit(1)
          PY

      - name: Create unit test summary
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET, json, sys, os
          junit='unit-results.xml'
          cov='coverage.xml'
          summary={}
          def parse_junit_file(path):
              try:
                  root=ET.parse(path).getroot()
                  tests=failures=errors=skipped=0
                  if root.tag == 'testsuites':
                      # try aggregated attrs first
                      if root.get('tests') is not None:
                          tests=int(root.get('tests') or 0)
                          failures=int(root.get('failures') or 0)
                          errors=int(root.get('errors') or 0)
                          skipped=int(root.get('skipped') or 0)
                      else:
                          for ts in root.findall('testsuite'):
                              tests += int(ts.get('tests') or 0)
                              failures += int(ts.get('failures') or 0)
                              errors += int(ts.get('errors') or 0)
                              skipped += int(ts.get('skipped') or 0)
                  else:
                      tests=int(root.get('tests') or 0)
                      failures=int(root.get('failures') or 0)
                      errors=int(root.get('errors') or 0)
                      skipped=int(root.get('skipped') or 0)
                  passed = tests - failures - errors - skipped
                  return {'tests':tests,'passed':passed,'failures':failures,'errors':errors,'skipped':skipped}
              except Exception as e:
                  return {'tests_summary_error':str(e)}
          if os.path.exists(junit):
              res = parse_junit_file(junit)
              summary.update(res)
          else:
              summary['tests']='missing'
          if os.path.exists(cov):
              try:
                  cr=ET.parse(cov).getroot()
                  pkg=cr.find('packages').find('package')
                  line_rate=float(pkg.get('line-rate'))*100
                  branch_rate=float(pkg.get('branch-rate'))*100
                  summary.update({'coverage_line':round(line_rate,1),'coverage_branch':round(branch_rate,1)})
              except Exception as e:
                  summary['coverage_error']=str(e)
          with open('unit-summary.json','w') as f:
              json.dump(summary,f)
          PY

      - name: Post unit test summary as check run output
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha || process.env.GITHUB_SHA || '';
            let md='### Unit Tests summary\n';
            try {
              const s=JSON.parse(fs.readFileSync('unit-summary.json','utf8'));
              if (s.tests === 'missing') {
                md += 'Unit test results missing\n\n';
              } else if (typeof s.tests !== 'undefined' && typeof s.passed !== 'undefined') {
                md += `Passed: **${s.passed}/${s.tests}**\n\n`;
              }
              if (typeof s.coverage_line !== 'undefined') md += `Line coverage: **${s.coverage_line}%**, Branch coverage: **${s.coverage_branch}%**\n\n`;
            } catch (e) {
              md += 'Failed to parse unit-summary.json\n';
            }
            const runs = await github.rest.checks.listForRef({owner,repo,ref:sha});
            const unitRun = runs.data.check_runs.find(r=>r.name==='Unit Tests');
            if (unitRun) {
              await github.rest.checks.update({owner,repo,check_run_id: unitRun.id, output:{title:'Unit Tests summary', summary: md}});
            } else {
              core.info('Unit Tests run not found; skipping check run update.');
            }

      - name: Collect unit outputs
        run: |
          set -eux
          # Copy any generated unit-results.xml (wherever it was written) to repo root
          find "$GITHUB_WORKSPACE" -type f -name 'unit-results.xml' -exec cp {} "$GITHUB_WORKSPACE/unit-results.xml" \; || true
          # Ensure unit-summary.json exists
          if [ ! -f unit-summary.json ]; then echo '{"tests":"missing"}' > unit-summary.json; fi

      - name: Upload unit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unit-artifacts
          path: |
            unit-summary.json
            **/unit-results.xml


      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 30
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright pytest

      - name: Install Playwright browsers and deps
        run: |
          python -m playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          pytest --maxfail=1 --disable-warnings -q tests/e2e --junitxml=${{ github.workspace }}/e2e-results.xml

      - name: Create e2e test summary
        if: always()
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET, json, os
          path='e2e-results.xml'
          summary={}
          def parse_junit_file(path):
              try:
                  root = ET.parse(path).getroot()
                  tests = failures = errors = skipped = 0
                  if root.tag == 'testsuites':
                      # try aggregated attrs first
                      if root.get('tests') is not None:
                          tests = int(root.get('tests') or 0)
                          failures = int(root.get('failures') or 0)
                          errors = int(root.get('errors') or 0)
                          skipped = int(root.get('skipped') or 0)
                      else:
                          for ts in root.findall('testsuite'):
                              tests += int(ts.get('tests') or 0)
                              failures += int(ts.get('failures') or 0)
                              errors += int(ts.get('errors') or 0)
                              skipped += int(ts.get('skipped') or 0)
                  elif root.tag == 'testsuite':
                      tests = int(root.get('tests') or 0)
                      failures = int(root.get('failures') or 0)
                      errors = int(root.get('errors') or 0)
                      skipped = int(root.get('skipped') or 0)
                  else:
                      for ts in root.findall('.//testsuite'):
                          tests += int(ts.get('tests') or 0)
                          failures += int(ts.get('failures') or 0)
                          errors += int(ts.get('errors') or 0)
                          skipped += int(ts.get('skipped') or 0)
                  passed = tests - failures - errors - skipped
                  return {'tests':tests,'passed':passed,'failures':failures,'errors':errors,'skipped':skipped}
              except Exception as e:
                  return {'tests_summary_error':str(e)}

          if os.path.exists(path):
              res = parse_junit_file(path)
              summary.update(res)
          else:
              summary['tests']='missing'
          with open('e2e-summary.json','w') as f:
              json.dump(summary,f)
          PY

      - name: Post e2e test summary as check run output
        if: always()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha || process.env.GITHUB_SHA || '';
            let md='### E2E Tests summary\n';
            try {
              const s=JSON.parse(fs.readFileSync('e2e-summary.json','utf8'));
              if (s.tests === 'missing') {
                md += 'E2E test results missing\n\n';
              } else if (typeof s.tests !== 'undefined' && typeof s.passed !== 'undefined') {
                md += `Passed: **${s.passed}/${s.tests}**\n\n`;
              }
            } catch(e) { md+='Failed to parse e2e-summary.json\n'; }
            const runs = await github.rest.checks.listForRef({owner,repo,ref:sha});
            const e2eRun = runs.data.check_runs.find(r=>r.name==='E2E Tests (Playwright)');
            if (e2eRun) { await github.rest.checks.update({owner,repo,check_run_id: e2eRun.id, output:{title:'E2E Tests summary',summary:md}}); } else { core.info('E2E run not found'); }

      - name: Collect E2E outputs
        if: always()
        run: |
          set -eux
          # Copy any generated e2e-results.xml (wherever it was written) to repo root
          find "$GITHUB_WORKSPACE" -type f -name 'e2e-results.xml' -exec cp {} "$GITHUB_WORKSPACE/e2e-results.xml" \; || true
          # Ensure e2e-summary.json exists (created earlier or create placeholder)
          if [ ! -f e2e-summary.json ]; then echo '{"tests":"missing"}' > e2e-summary.json; fi

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            e2e-summary.json
            e2e-results.xml
            **/e2e-results.xml
            /tmp/playwright-trace-*.zip
            /tmp/e2e-page1-*.png
            /tmp/e2e-page2-*.png

