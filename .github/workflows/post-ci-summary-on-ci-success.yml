name: Post CI test summary to PR

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  checks: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  post-summary:
    name: Post CI test summary to PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository at commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      # Use actions/download-artifact@v4 with run-id to correctly download artifacts
      # from the triggering CI workflow run. The previous approach used curl to fetch
      # the artifact zip via the GitHub API, which redirects to a pre-signed storage URL
      # (Azure/S3). curl forwarded the Authorization header to the storage URL, causing
      # the storage service to reject the request (pre-signed URLs use query-param auth
      # and conflict with an additional Authorization header). The result was a non-zip
      # error response being saved and unzip failing silently, leaving no summary files.
      - name: Download unit artifacts
        uses: actions/download-artifact@v4
        with:
          name: unit-artifacts
          path: ci-artifacts/unit
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download e2e artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-artifacts
          path: ci-artifacts/e2e
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Prepare artifact files
        if: always()
        run: |
          mkdir -p ci-artifacts
          [ -f ci-artifacts/unit/unit-summary.json ] && cp -f ci-artifacts/unit/unit-summary.json ci-artifacts/unit-summary.json || true
          [ -f ci-artifacts/e2e/e2e-summary.json ]   && cp -f ci-artifacts/e2e/e2e-summary.json   ci-artifacts/e2e-summary.json  || true
          echo "ci-artifacts contents:"; ls -lah ci-artifacts/ || true

      - name: Compute TCR metrics
        if: always()
        run: |
          python - <<'PY'
          import os, json

          def count_nonempty_py_lines(root):
              cnt = 0
              if not os.path.isdir(root):
                  return 0
              for dirpath, dirnames, filenames in os.walk(root):
                  for fn in filenames:
                      if not fn.endswith('.py'):
                          continue
                      try:
                          with open(os.path.join(dirpath, fn), 'rb') as f:
                              cnt += sum(1 for line in f if line.strip())
                      except Exception:
                          pass
              return cnt

          tests_lines = count_nonempty_py_lines('tests')
          app_lines = count_nonempty_py_lines('app')
          tcr = round(tests_lines / app_lines, 3) if app_lines else None
          res = {'tests_lines': tests_lines, 'app_lines': app_lines, 'tcr': tcr}
          with open('/tmp/ci-metrics.json', 'w') as f:
              json.dump(res, f)
          print(res)
          PY

      - name: Build and post CI summary comment
        if: always()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const payload = context.payload || {};
            let prs = [];
            let headSha = context.sha || '';

            if (payload.workflow_run) {
              const wr = payload.workflow_run;
              prs = wr.pull_requests || [];
              headSha = wr.head_sha || headSha;
            }

            if ((!prs || prs.length === 0) && headSha) {
              try {
                const prsResp = await github.rest.repos.listPullRequestsAssociatedWithCommit({ owner, repo, commit_sha: headSha });
                prs = prsResp.data || [];
                core.info(`Found ${prs.length} PR(s) associated with ${headSha}`);
              } catch (e) { core.info(`PR lookup failed: ${e.message || e}`); }
            }

            const prNumbers = prs.map(p => p.number ? p.number : p).filter(Boolean);
            if (!prNumbers || prNumbers.length === 0) { core.info('No associated PRs found; skipping comment'); return; }

            const ciConclusion = (payload.workflow_run && payload.workflow_run.conclusion) || 'unknown';
            const conclusionEmoji = ciConclusion === 'success' ? '✅' : ciConclusion === 'failure' ? '❌' : '⚠️';

            let md = `<!-- ci-summary -->\n## ${conclusionEmoji} CI テスト結果 (commit: \`${headSha.slice(0,7)}\`)\n\n`;

            if (fs.existsSync('ci-artifacts/unit-summary.json')) {
              try {
                const u = JSON.parse(fs.readFileSync('ci-artifacts/unit-summary.json', 'utf8'));
                md += '### 🧪 Unit Tests\n';
                if (typeof u.tests !== 'undefined' && typeof u.passed !== 'undefined') {
                  const icon = (u.failures || 0) + (u.errors || 0) > 0 ? '❌' : '✅';
                  md += `${icon} **${u.passed} / ${u.tests} 件 OK**`;
                  if ((u.failures || 0) > 0) md += ` (失敗: ${u.failures})`;
                  if ((u.skipped || 0) > 0) md += ` (スキップ: ${u.skipped})`;
                  md += '\n\n';
                }
                if (typeof u.coverage_line !== 'undefined' || typeof u.coverage_branch !== 'undefined') {
                  md += `> Line coverage: **${u.coverage_line || 'N/A'}%** / Branch coverage: **${u.coverage_branch || 'N/A'}%**\n\n`;
                }
              } catch (e) { md += '> unit-summary.json の読み込みに失敗しました\n\n'; }
            } else {
              md += '### 🧪 Unit Tests\n> 結果データなし\n\n';
            }

            if (fs.existsSync('ci-artifacts/e2e-summary.json')) {
              try {
                const e = JSON.parse(fs.readFileSync('ci-artifacts/e2e-summary.json', 'utf8'));
                md += '### 🌐 E2E Tests\n';
                if (typeof e.tests !== 'undefined' && typeof e.passed !== 'undefined') {
                  const icon = (e.failures || 0) + (e.errors || 0) > 0 ? '❌' : '✅';
                  md += `${icon} **${e.passed} / ${e.tests} 件 OK**`;
                  if ((e.failures || 0) > 0) md += ` (失敗: ${e.failures})`;
                  if ((e.skipped || 0) > 0) md += ` (スキップ: ${e.skipped})`;
                  md += '\n\n';
                }
              } catch (e) { md += '> e2e-summary.json の読み込みに失敗しました\n\n'; }
            } else {
              md += '### 🌐 E2E Tests\n> 結果データなし (Unit Tests が失敗した場合はスキップされます)\n\n';
            }

            if (fs.existsSync('/tmp/ci-metrics.json')) {
              try {
                const m = JSON.parse(fs.readFileSync('/tmp/ci-metrics.json', 'utf8'));
                md += '### 📊 TCR (Test-to-Code Ratio)\n';
                if (m.tcr !== null && m.tcr !== undefined) {
                  md += `**TCR: ${m.tcr}** (テストコード: ${m.tests_lines} 行 / プロダクションコード: ${m.app_lines} 行)\n\n`;
                } else {
                  md += '> TCR: N/A (コード行数の取得に失敗しました)\n\n';
                }
              } catch (e) { md += '> ci-metrics.json の読み込みに失敗しました\n\n'; }
            }

            md += `---\n[詳細を確認する](https://github.com/${owner}/${repo}/commit/${headSha}/checks)\n\n_このコメントは CI 完了時に自動投稿されます。_`;

            for (const prNumber of prNumbers) {
              const commentsResp = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 200 });
              const matches = commentsResp.data.filter(c => c.body && c.body.includes('<!-- ci-summary -->') && c.user && (c.user.type === 'Bot' || c.user.login === 'github-actions[bot]'));
              if (!matches || matches.length === 0) {
                await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: md });
                core.info(`PR #${prNumber} に CI テスト結果コメントを投稿しました`);
              } else {
                matches.sort((a,b) => new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at));
                const keep = matches[0];
                for (let i = 1; i < matches.length; i++) {
                  try {
                    await github.rest.issues.deleteComment({ owner, repo, comment_id: matches[i].id });
                  } catch (e) {
                    core.info(`コメント削除失敗 ${matches[i].id}: ${e.message || e}`);
                  }
                }
                await github.rest.issues.updateComment({ owner, repo, comment_id: keep.id, body: md });
                core.info(`PR #${prNumber} の CI テスト結果コメントを更新しました`);
              }
            }
