<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ root_path }}/static/style.css" />
    {% if ws_url %}<script>window.WS_URL = "{{ ws_url }}";</script>{% endif %}
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <div class="panel-header">
          <h1>{{ app_name }}</h1>
          {% if user %}
          <div class="header-actions">
            <span class="user-name">ようこそ、{{ user }}さん</span>
            <a class="button logout" href="{{ root_path }}/logout">ログアウト</a>
          </div>
          {% endif %}
        </div>
        <p class="sub">待ち受け番号でつながる、シンプルな動画チャット。</p>

        <label>
          表示名
          <input id="name" type="text" placeholder="Toru" />
        </label>

        <label>
          待ち受け番号
          <input id="roomCode" type="text" placeholder="1234" />
        </label>

        <div class="actions">
          <button id="joinBtn">参加</button>
          <button id="leaveBtn" disabled>退出</button>
          <button id="toggleCameraBtn" disabled>カメラOFF</button>
          <button id="toggleAudioBtn" disabled>マイクOFF</button>
          <button id="toggleSoundBtn" class="sound-toggle">🔔 通知音ON</button>
        </div>

        <label>
          メッセージ
          <div class="message-row">
            <input id="messageInput" type="text" placeholder="コメントを入力..." />
            <button id="sendMsgBtn">送信</button>
          </div>
        </label>

        <p id="status" class="status">待機中</p>
      </section>

      <section class="video-grid" id="videos">
        <div id="danmaku" class="danmaku-container"></div>
        <div class="video-tile" data-peer-id="local">
          <h3>自分</h3>
          <video id="localVideo" autoplay playsinline muted></video>
        </div>
    <div id="quality-toast" class="quality-toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script src="{{ root_path }}/static/app.js"></script>
  </body>
</html>
