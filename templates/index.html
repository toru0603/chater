<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>{{ app_name }}</h1>
        <p class="sub">待ち受け番号でつながる、シンプルな動画チャット。</p>

        <label>
          表示名
          <input id="name" type="text" placeholder="Toru" />
        </label>

        <label>
          待ち受け番号
          <input id="roomCode" type="text" placeholder="1234" />
        </label>

        <div class="actions">
          <button id="joinBtn">参加</button>
          <button id="leaveBtn" disabled>退出</button>
        </div>

        <p id="status" class="status">待機中</p>
      </section>

      <section class="video-grid">
        <article>
          <h2>自分</h2>
          <video id="localVideo" autoplay playsinline muted></video>
        </article>
        <article>
          <h2>相手</h2>
          <video id="remoteVideo" autoplay playsinline></video>
        </article>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
